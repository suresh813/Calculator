<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Big Button Scientific Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="An accessible, touch-friendly scientific calculator you can install on your device">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">

<!-- iOS PWA Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calculator">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<!-- iOS splash screens (portrait iPhone) -->
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body class="theme-high-contrast">

<!-- Install Banner -->
<div id="installBanner" style="display:none">
  <p>📲 Install this app for quick access!</p>
  <button id="installBtn">Install</button>
  <button id="dismissBtn">✕</button>
</div>

<!-- iOS Install Instructions (shown only on iOS) -->
<div id="iosBanner" style="display:none">
  <p>📲 To install: tap <strong>Share</strong> then <strong>"Add to Home Screen"</strong></p>
  <button id="iosDismissBtn">✕</button>
</div>

<div class="calculator-wrapper">

<main class="calculator">

<header class="calculator-header">

  <div class="title-row">
    <h1>Big Button Calculator</h1>
    <span class="badge">Accessible • Touch-friendly</span>
  </div>

  <section class="display" aria-label="Calculator display">
    <div id="history" aria-live="polite"></div>
    <div id="display" role="status" aria-live="assertive">0</div>
  </section>

  <section class="settings" aria-label="Settings">

    <label class="toggle">
      <input type="checkbox" id="soundToggle" checked>
      Sound
    </label>

    <label class="toggle">
      <input type="checkbox" id="vibrationToggle" checked>
      Vibration
    </label>

    <label class="toggle">
      <input type="checkbox" id="themeToggle" checked>
      High contrast
    </label>

  </section>

</header>

<section class="keys" aria-label="Calculator keys">

  <!-- scientific -->
  <button class="key operator" data-action="sqrt" aria-label="Square root">√</button>
  <button class="key operator" data-action="square" aria-label="Square">x²</button>
  <button class="key operator" data-action="sin" aria-label="Sine">sin</button>
  <button class="key operator" data-action="cos" aria-label="Cosine">cos</button>

  <button class="key operator" data-action="tan" aria-label="Tangent">tan</button>
  <button class="key operator" data-action="log" aria-label="Logarithm">log</button>
  <button class="key operator" data-action="percent" aria-label="Percent">%</button>
  <button class="key operator" data-action="pi" aria-label="Pi">π</button>

  <!-- control -->
  <button class="key action" data-action="backspace" aria-label="Backspace">⌫</button>
  <button class="key action" data-action="clear-entry" aria-label="Clear entry">C</button>
  <button class="key action" data-action="clear-all" aria-label="Clear all">AC</button>
  <button class="key operator" data-operator="divide" aria-label="Divide">÷</button>

  <!-- numbers -->
  <button class="key" data-digit="7">7</button>
  <button class="key" data-digit="8">8</button>
  <button class="key" data-digit="9">9</button>
  <button class="key operator" data-operator="multiply" aria-label="Multiply">×</button>

  <button class="key" data-digit="4">4</button>
  <button class="key" data-digit="5">5</button>
  <button class="key" data-digit="6">6</button>
  <button class="key operator" data-operator="subtract" aria-label="Subtract">−</button>

  <button class="key" data-digit="1">1</button>
  <button class="key" data-digit="2">2</button>
  <button class="key" data-digit="3">3</button>
  <button class="key operator" data-operator="add" aria-label="Add">+</button>

  <button class="key zero" data-digit="0">0</button>
  <button class="key" data-action="decimal" aria-label="Decimal point">.</button>
  <button class="key equals" data-action="equals" aria-label="Equals">=</button>

</section>

</main>
</div>

<script src="script.js"></script>

<script>
  // --- PWA Install Logic ---

  const installBanner = document.getElementById('installBanner');
  const installBtn = document.getElementById('installBtn');
  const dismissBtn = document.getElementById('dismissBtn');
  const iosBanner = document.getElementById('iosBanner');
  const iosDismissBtn = document.getElementById('iosDismissBtn');

  let deferredPrompt;

  // Detect iOS
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

  // Show iOS banner if on iOS and not already installed
  if (isIos && !isInStandaloneMode) {
    iosBanner.style.display = 'flex';
  }

  iosDismissBtn.addEventListener('click', () => {
    iosBanner.style.display = 'none';
  });

  // Android/Chrome install prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!isInStandaloneMode) {
      installBanner.style.display = 'flex';
    }
  });

  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.style.display = 'none';
    }
  });

  dismissBtn.addEventListener('click', () => {
    installBanner.style.display = 'none';
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>

</body>
</html>
